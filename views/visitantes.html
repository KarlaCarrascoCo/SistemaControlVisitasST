<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registro de Visitas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-st">

    <div class="container d-flex justify-content-between">

        <span class="navbar-brand">

            Control de Visitas Santo Tomás

        </span>

        <div class="d-flex align-items-center gap-3">

            <span
                id="usuarioActual"
                class="text-white fw-bold">

            </span>

            <button
                id="btnSalir"
                class="btn btn-danger btn-sm">

                Cerrar Sesión

            </button>

        </div>

    </div>

</nav>

    <div class="container container-formulario">

        <h2 class="text-center titulo-principal">

            Registro de Visitas

        </h2>

        <div class="mb-3 d-flex gap-2">

            <a href="/listadoVisitantes.html"
   class="btn btn-st">

    Ver Listado

</a>

            <button
                id="btnCancelar"
                class="btn btn-secondary"
                style="display:none;">

                Cancelar Edición

            </button>

        </div>

        <div class="card card-personalizada">

            <div class="card-body">

                <form id="formVisitante">

                    <!-- DOCUMENTO -->

                    <div class="mb-3">

                        <label class="form-label">

                            Tipo Documento

                        </label>

                        <select
                            id="tipo_documento"
                            class="form-control">

                            <option value="RUT">
                                RUT
                            </option>

                            <option value="PASAPORTE">
                                PASAPORTE
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Número Documento

                        </label>

                        <input
                            type="text"
                            id="numero_documento"
                            class="form-control"
                            required>

                    </div>

                    <!-- DATOS PERSONALES -->

                    <div class="mb-3">

                        <label class="form-label">

                            Nombre Completo

                        </label>

                        <input
                            type="text"
                            id="nombre_completo"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Correo

                        </label>

                        <input
                            type="email"
                            id="correo"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Teléfono

                        </label>

                        <input
                            type="text"
                            id="telefono"
                            class="form-control"
                            required>

                    </div>

                    <hr>

                    <h5 class="mb-3">

                        Información Vehicular

                    </h5>

                    <!-- VEHICULO + PATENTE -->

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                ¿Viene en Vehículo?

                            </label>

                            <select
                                id="viene_vehiculo"
                                class="form-control">

                                <option value="0">

                                    No

                                </option>

                                <option value="1">

                                    Sí

                                </option>

                            </select>

                        </div>

                        <div
                            id="grupoPatente"
                            class="col-md-6 mb-3"
                            style="display:none;">

                            <label class="form-label">

                                Patente

                            </label>

                            <input
                                type="text"
                                id="patente"
                                class="form-control">

                        </div>

                    </div>

                    <!-- MARCA MODELO COLOR -->

                    <div
                        id="datosVehiculo"
                        style="display:none;">

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label class="form-label">

                                    Marca

                                </label>

                                <input
                                    type="text"
                                    id="marca"
                                    class="form-control">

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">

                                    Modelo

                                </label>

                                <input
                                    type="text"
                                    id="modelo"
                                    class="form-control">

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">

                                    Color

                                </label>

                                <input
                                    type="text"
                                    id="color"
                                    class="form-control">

                            </div>

                        </div>

                    </div>
                    
            <div class="mb-3">

    <label class="form-label">

        Estado de Asistencia

    </label>

    <select
        id="asistio"
        class="form-control">

        <option value="1">

            Asistió

        </option>

        <option value="0">

            No Asistió

        </option>

    </select>

</div>
                    <button
                        id="btnGuardar"
                        type="submit"
                        class="btn btn-st w-100">

                        Guardar Visita

                    </button>

                </form>

            </div>

        </div>

    </div>

    <script>

const usuarioLogueado =
JSON.parse(
    localStorage.getItem(
        'usuarioLogueado'
    )
);

if (!usuarioLogueado) {

    window.location.href =
    '/login.html';
}

document
.getElementById('usuarioActual')
.innerText =
`${usuarioLogueado.nombre} ${usuarioLogueado.apellido} | ${usuarioLogueado.nombre_rol}`;

let visitanteEditar =
localStorage.getItem('visitanteEditar');


// =========================
// MOSTRAR / OCULTAR VEHÍCULO
// =========================

function controlarVehiculo() {

    const vieneVehiculo =
    document.getElementById(
        'viene_vehiculo'
    ).value;

    if (vieneVehiculo === '1') {

        document.getElementById(
            'grupoPatente'
        ).style.display = 'block';

        document.getElementById(
            'datosVehiculo'
        ).style.display = 'block';

    } else {

        document.getElementById(
            'grupoPatente'
        ).style.display = 'none';

        document.getElementById(
            'datosVehiculo'
        ).style.display = 'none';

        document.getElementById(
            'patente'
        ).value = '';

        document.getElementById(
            'marca'
        ).value = '';

        document.getElementById(
            'modelo'
        ).value = '';

        document.getElementById(
            'color'
        ).value = '';
    }
}

document
.getElementById('viene_vehiculo')
.addEventListener(
    'change',
    controlarVehiculo
);

// =========================
// CARGAR DATOS PARA EDITAR
// =========================

window.onload = async () => {

    if (visitanteEditar) {

        const respuesta =
        await fetch(
            `http://localhost:3000/api/visitantes/${visitanteEditar}`
        );

        const visitante =
        await respuesta.json();

        document.getElementById(
            'tipo_documento'
        ).value =
        visitante.tipo_documento;

        document.getElementById(
            'numero_documento'
        ).value =
        visitante.numero_documento;

        document.getElementById(
            'nombre_completo'
        ).value =
        visitante.nombre_completo;

        document.getElementById(
            'correo'
        ).value =
        visitante.correo;

        document.getElementById(
            'telefono'
        ).value =
        visitante.telefono;

        document.getElementById(
            'viene_vehiculo'
        ).value =
        visitante.viene_vehiculo;

        controlarVehiculo();

        document.getElementById(
            'patente'
        ).value =
        visitante.patente || '';

        document.getElementById(
            'marca'
        ).value =
        visitante.marca || '';

        document.getElementById(
            'modelo'
        ).value =
        visitante.modelo || '';

        document.getElementById(
            'color'
        ).value =
        visitante.color || '';

        document.getElementById(
            'btnGuardar'
        ).innerText =
        'Actualizar Visita';

        document.getElementById(
            'btnCancelar'
        ).style.display =
        'inline-block';
    }
};

// =========================
// VALIDACIONES
// =========================

function validarRUT(rut) {

    const patron =
    /^\d{1,2}\.\d{3}\.\d{3}-[\dKk]$/;

    return patron.test(rut);
}

function validarPasaporte(pasaporte) {

    const patron =
    /^[A-Za-z]{2}\d{7}$/;

    return patron.test(
        pasaporte.toUpperCase()
    );
}

// =========================
// GUARDAR / ACTUALIZAR
// =========================

document
.getElementById('formVisitante')
.addEventListener(
    'submit',
    async (e) => {

        e.preventDefault();

        const tipoDocumento =
        document.getElementById(
            'tipo_documento'
        ).value;

        const numeroDocumento =
        document.getElementById(
            'numero_documento'
        ).value;
        if (
            tipoDocumento === 'RUT'
        ) {
            if (
                !validarRUT(
                    numeroDocumento
                )
            ) {
                alert(
                    'Formato de RUT inválido. Ejemplo: 22.222.222-2'
                );
                return;
            }
        }
        if (
            tipoDocumento === 'PASAPORTE'
        ) {
            if (
                !validarPasaporte(
                    numeroDocumento
                )
            ) {
                alert(
                    'Formato de pasaporte inválido. Ejemplo: AA1234567'
                );
                return;
            }
        }

const vieneVehiculo =
document.getElementById(
    'viene_vehiculo'
).value;

const marca =
document.getElementById(
    'marca'
).value;

const modelo =
document.getElementById(
    'modelo'
).value;

const color =
document.getElementById(
    'color'
).value;

const patente =
document.getElementById(
    'patente'
).value;

if (vieneVehiculo == '1') {

    if (
        marca.trim() === '' ||
        modelo.trim() === '' ||
        color.trim() === '' ||
        patente.trim() === ''
    ) {

        alert(
            'Debe completar marca, modelo, color y patente del vehículo.'
        );

        return;
    }
}

const visitante = {

    tipo_documento:
    document.getElementById('tipo_documento').value,

    numero_documento:
    document.getElementById('numero_documento').value,

    nombre_completo:
    document.getElementById('nombre_completo').value,

    correo:
    document.getElementById('correo').value,

    telefono:
    document.getElementById('telefono').value,

    fecha_visita:
    new Date().toISOString().split('T')[0],

    hora_visita:
    new Date().toTimeString().slice(0,5),

    viene_vehiculo:
    document.getElementById('viene_vehiculo').value,

    marca:
    document.getElementById('marca').value,

    modelo:
    document.getElementById('modelo').value,

    color:
    document.getElementById('color').value,

    patente:
    document.getElementById('patente').value,

    asistio:
    document.getElementById('asistio').value,

    id_usuario_registra:
    usuarioLogueado.id_usuario,

    id_unidad:
    usuarioLogueado.id_unidad
};

        try {

            let respuesta;

            if (visitanteEditar) {

                respuesta =
                await fetch(
                    `http://localhost:3000/api/visitantes/${visitanteEditar}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Content-Type':
                            'application/json'
                        },
                        body:
                        JSON.stringify(
                            visitante
                        )
                    }
                );

            } else {

                respuesta =
                await fetch(
                    'http://localhost:3000/api/visitantes',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type':
                            'application/json'
                        },
                        body:
                        JSON.stringify(
                            visitante
                        )
                    }
                );
            }

            const datos =
            await respuesta.json();

            alert(
                datos.mensaje
            );

            localStorage.removeItem(
                'visitanteEditar'
            );

            window.location.href =
            '/listadoVisitantes.html';

        } catch (error) {

            console.error(error);

            alert(
                'Error de conexión'
            );
        }
    }
);

// =========================
// CANCELAR EDICIÓN
// =========================

document
.getElementById('btnCancelar')
.addEventListener(
    'click',
    () => {

        localStorage.removeItem(
            'visitanteEditar'
        );

        window.location.href =
        '/';
    }
);

document
.getElementById('btnSalir')
.addEventListener('click', () => {

    const confirmar =
    confirm(
        '¿Está seguro que desea cerrar sesión?'
    );

    if (!confirmar) return;

    localStorage.removeItem(
        'usuarioLogueado'
    );

    window.location.href =
    '/login.html';
});

</script>

</body>
</html>
