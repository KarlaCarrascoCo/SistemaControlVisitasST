<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Listado de Visitas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-st">

        <div class="container">

            <span class="navbar-brand">

                Control de Visitas Santo Tomás

            </span>

        </div>

    </nav>

    <div class="container mt-5">

        <h2 class="text-center titulo-principal">

            Listado de Visitas

        </h2>

            <div class="d-flex gap-2">

        <a href="/"
        class="btn btn-st">

            Formulario

        </a>

        <a href="/reportes.html"
        class="btn btn-secondary">

            Reportes

        </a>

</div>

        </div>

        <div class="card card-personalizada mb-3">

            <div class="card-body text-center">

                <h5>

                    Total de visitas registradas:

                    <span id="totalVisitantes">

                        0

                    </span>

                </h5>

            </div>

        </div>

        <div class="card card-personalizada">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table align-middle">

                        <thead>

                            <tr>

                                <th>ID</th>
                                <th style="min-width:140px;">Documento</th>
                                <th style="min-width:220px;">Nombre</th>
                                <th style="min-width:120px;">Fecha</th>
                                <th style="min-width:80px;">Hora</th>
                                <th>Vehículo</th>
                                <th>Patente</th>
                                <th>Asistencia</th>
                                <th>Acciones</th>

                            </tr>

                        </thead>

                        <tbody id="tablaVisitantes">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

<script>

const usuarioLogueado =
JSON.parse(
    localStorage.getItem(
        'usuarioLogueado'
    )
);

if (!usuarioLogueado) {

    window.location.href =
    '/login.html';
}

function formatearFecha(fecha) {

    if (!fecha) return '';

    const fechaObj = new Date(fecha);

    const dia =
    String(fechaObj.getDate())
    .padStart(2, '0');

    const mes =
    String(fechaObj.getMonth() + 1)
    .padStart(2, '0');

    const anio =
    fechaObj.getFullYear();

    return `${dia}-${mes}-${anio}`;
}

function formatearHora(hora) {

    if (!hora) return '';

    return hora.substring(0, 5);
}

async function cargarVisitantes() {

    const respuesta =
    await fetch(
        'http://localhost:3000/api/visitantes'
    );

    const visitantes =
    await respuesta.json();

    document
    .getElementById('totalVisitantes')
    .innerText =
    visitantes.length;

    const esGuardia =
    usuarioLogueado.id_rol == 3;

    let filas = '';

    visitantes.forEach(v => {

        filas += `
            <tr>

                <td>${v.id_visitante}</td>

                <td>${v.numero_documento}</td>

                <td>${v.nombre_completo}</td>

                <td>
                    ${formatearFecha(v.fecha_visita)}
                </td>

                <td>
                    ${formatearHora(v.hora_visita)}
                </td>

                <td>
                    ${v.viene_vehiculo == 1 ? 'Sí' : 'No'}
                </td>

                <td>
                    ${v.patente || '-'}
                </td>

                <td>
                    ${v.asistio == 1
                    ? '✅ Asistió'
                    : '❌ No Asistió'}
                </td>

                <td>

${!esGuardia ? `

    <button
        class="btn btn-warning btn-sm me-2"
        onclick="editar(${v.id_visitante})">

        Editar

    </button>

    <button
        class="btn btn-danger btn-sm"
        onclick="eliminar(${v.id_visitante})">

        Eliminar

    </button>

` : 'Sin permisos'}

</td>

            </tr>
        `;
    });

    document
    .getElementById('tablaVisitantes')
    .innerHTML = filas;
}

async function eliminar(id) {

    const confirmar =
    confirm(
        '¿Desea eliminar esta visita?'
    );

    if (!confirmar) return;

    try {

        const respuesta =
        await fetch(
            `http://localhost:3000/api/visitantes/${id}`,
            {
                method: 'DELETE'
            }
        );

        const datos =
        await respuesta.json();

        alert(datos.mensaje);

        cargarVisitantes();

    } catch (error) {

        console.error(error);

        alert(
            'Error al eliminar visita'
        );
    }
}

function editar(id) {

    localStorage.setItem(
        'visitanteEditar',
        id
    );

    window.location.href = '/';
}

cargarVisitantes();

</script>

</body>

</html>
