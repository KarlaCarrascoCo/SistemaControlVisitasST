<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ingreso Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-st">

        <div class="container">

            <span class="navbar-brand">

                Control de Visitas Santo Tomás

            </span>

        </div>

    </nav>

    <div class="container mt-5">

        <h2 class="text-center titulo-principal">

            Inicio de Sesión

        </h2>

        <div class="card card-personalizada">

            <div class="card-body">

                <form id="formLogin">

                    <div class="mb-3">

                        <label class="form-label">

                            Correo

                        </label>

                        <input
                            type="email"
                            id="correo"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Contraseña

                        </label>

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-st w-100">

                        Ingresar

                    </button>

                </form>

            </div>

        </div>

    </div>

<script>

document
.getElementById('formLogin')
.addEventListener('submit', async (e) => {

    e.preventDefault();

    const correo =
    document.getElementById('correo').value;

    const password =
    document.getElementById('password').value;

    try {

        const respuesta =
        await fetch(
            'http://localhost:3000/api/login',
            {
                method: 'POST',
                headers: {
                    'Content-Type':
                    'application/json'
                },
                body: JSON.stringify({
                    correo,
                    password
                })
            }
        );

        const datos =
        await respuesta.json();

        if (!respuesta.ok) {

            alert(datos.mensaje);

            return;
        }

        localStorage.setItem(
            'usuarioLogueado',
            JSON.stringify(datos.usuario)
        );

        window.location.href = '/';

    } catch (error) {

        console.error(error);

        alert('Error de conexión');
    }
});

</script>

</body>

</html>
